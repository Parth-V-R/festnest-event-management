{% extends 'base.html' %}

{% block title %}Reset via Email{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="container auth-shell">
    <div class="auth-card admin-form-card">
        <h2>Reset Password via Email</h2>
        <p class="muted-text">Enter your Email ID to receive a password reset link.</p>

        <form method="post" class="auth-form event-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="cta-btn auth-submit">Send Reset Link</button>
        </form>

        <p class="auth-link"><a href="{% url 'forgot_password_options' %}" class="clear-search-btn">Back</a></p>
    </div>
</div>
{% endblock %}
