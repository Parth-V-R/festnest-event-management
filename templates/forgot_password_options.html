{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="container auth-shell">
    <div class="auth-card admin-form-card">
        <h2>Forgot Password</h2>
        <p class="muted-text">Choose how you want to reset your password.</p>

        <div class="detail-actions">
            <a href="{% url 'password_reset' %}" class="cta-btn detail-action-btn">Reset via Email</a>
            <a href="{% url 'forgot_password_mobile' %}" class="cta-btn detail-action-btn back-btn">Reset via Mobile OTP</a>
        </div>

        <p class="auth-link"><a href="{% url 'login' %}" class="clear-search-btn">Back to Login</a></p>
    </div>
</div>
{% endblock %}
