{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="container auth-shell">
    <div class="auth-card">
        <h2>{{ page_title }}</h2>

        <form method="post" class="auth-form event-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="cta-btn auth-submit">{{ button_label }}</button>
        </form>

        <p class="auth-link"><a href="{% url 'manage_events' %}">Back to Manage Events</a></p>
    </div>
</div>
{% endblock %}
