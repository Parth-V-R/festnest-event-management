{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ category }} Events</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<h1 style="text-align:center; margin-top:20px;">
    {{ category|title }} Events
</h1>

<div class="container">
    <div class="card-grid">
        {% for event in events %}
    <div class="event-card">
        <h3>{{ event.title }}</h3>
        <p>Date: {{ event.date }}</p>

        {% if user.is_authenticated %}
            <a href="{% url 'register_event' event.id %}" class="cta-btn">
                Register
            </a>
        {% else %}
            <p><a href="{% url 'login' %}">Login to register</a></p>
        {% endif %}
    </div>
{% endfor %}
    </div>
</div>

</body>
</html>
