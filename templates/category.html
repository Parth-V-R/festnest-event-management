{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ category }} Events</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<h1 style="text-align:center; margin-top:20px;">
    {{ category|title }} Events
</h1>

<div class="container">
    <div class="card-grid">
        {% for event in events %}
        <div class="event-card">
            <h3>{{ event.title }}</h3>
            <p>Date: {{ event.date }}</p>
            <p>{{ event.description }}</p>
        </div>
        {% empty %}
        <p>No events found</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
